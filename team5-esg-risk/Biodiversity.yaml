        reason: "Documented SLA, ownership, and source lineage strengthen operational resilience expectations"
      - regulation: AML
        status: N/A
        reason: "No transaction monitoring, sanctions, or customer due diligence data is present"
      - regulation: MiFID II
        status: N/A
        reason: "No investment, trading, or suitability data is present"
      - regulation: PSD2
        status: N/A
        reason: "No payment services or open banking data is present"
      - regulation: GDPR
        status: N/A
        reason: "No personal data is processed because the product describes buildings and environmental indicators only"
      - regulation: AI Act
        status: N/A
        reason: "This version of the product is assembled from governed source datasets and is not produced by an AI model"
      - regulation: IFRS 9
        status: Contributes
        reason: "Environmental and hazard indicators may support forward-looking overlays in credit risk analysis"
    ai_act:
      is_ai_input: false
      is_ai_output: false
      high_risk_classification: false
      fria_required: false
      fria_notes: "FRIA not required because this product is not generated by AI and is not designed as a direct AI input in this contract version."
  glossary_entry:
    term: "Biodiversity and Physical Hazard Profile"
    definition: "A governed analytical profile that aggregates biodiversity sensitivity and physical hazard indicators for financed buildings and collateral objects to support underwriting and portfolio risk management."
    fibo_class: "fibo-loan:CollateralCharacteristic"
    fibo_uri: "https://spec.edmcouncil.org/fibo/ontology/LOAN/LoansGeneral/CollateralCharacteristic"
    domain: ESG Risk
    dawiso_status: draft
    steward: Juraj Cery - juraj.cery@horizon-ai-bank.cz
    synonyms:
      - Environmental Hazard Profile
      - Biodiversity Risk Profile
      - Building Hazard Profile
    acronyms:
      - ESG
    related_capability: "Environmental Collateral Risk Assessment"
    related_terms:
