dataContractSpecification: 1.1.0
id: urn:datacontract:nova-banka:accounting:gl-deviation-snapshot-state:0.1.0
info:
  title: Accounting Deviation Snapshot
  name: Accounting GL Deviation Snapshot STATE
  product_type: STATE
  maturity_score: 30%
  version: 0.1.0
  status: draft
  description: |
    Data latency: T+1
    Business Entity: General Ledger Account
    Business Purpose: Reconciliation of GL and client data for Head Office reporting.
      Datový produkt slouží k vyřešení deviací mezi zůstatky hlavní knihy (GL)
      a klientskými daty. Zajišťuje bezchybný reporting mateřské společnosti,
      včasnou detekci chyb a důvěryhodnost finančních výkazů.
    Consumers: Head Office (matka), Data Stewardi, Účetnictví
    Data Sources: Transakční systémy, Tým 3: Obsluha klienta
  owner: "Nova Banka / Team 4: Steering Data / Accounting"
  x-regulatory:
    gdpr_relevant: false
    critical_data_element: true
    regulatory_framework: "IFRS 9"

contact:
  name: Josef Kuník
  email: josef.kunik@nova-banka.cz

servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-nova-banka-prod
    schema: accounting-prod
    table: gl_deviation_snapshot
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-nova-banka-dev
    schema: accounting-dev
    table: gl_deviation_snapshot

schema:
  - name: gl_deviation_snapshot
    description: Snapshot of GL account balances and calculated deviations in CZK
    fields:
      - name: record_id
        type: string
        description: Unique record identifier (UUID v4)
        required: true
        unique: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: business_date
        type: date
        description: Business processing date (YYYY-MM-DD)
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: region
        type: string
        description: Geographic region [CZ, SK]
        required: true
        enum: [CZ, SK]
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: GLBAL_DATE
        type: date
        description: General Ledger balance date
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: DOM_GCOA
        type: string
        description: Global Chart of Accounts (GCOA) account identifier
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: WORK_BAL
        type: double
        description: Working balance amount
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: AVG_WORK_BAL
        type: double
        description: Average working balance amount
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: GLBAL_AMOUNT_CZK
        type: double
        description: General Ledger balance amount in CZK
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: AVG_GLBAL_AMOUNT_CZK
        type: double
        description: Average General Ledger balance amount in CZK
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: VD5_BAL
        type: double
        description: VD5 balance amount
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: VD5_BAL_AVG
        type: double
        description: Average VD5 balance amount
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: DIFF_BAL_CALC
        type: double
        description: Calculated difference balance
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: AVG_DIFF_BAL_CALC
        type: double
        description: Average calculated difference balance
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

quality:
  - rule: not_null
    field: record_id

  - rule: unique
    field: record_id

  - rule: row_count
    min: 1000
    max: 50000
    description: "Detects data distribution anomalies (volume drop/spike) for GCOA deviation reporting"

  - rule: accepted_values
    field: region
    values: [CZ, SK]

sla:
  availability: 99.5%
  data_latency: T+1
  retention_period: 12 months
