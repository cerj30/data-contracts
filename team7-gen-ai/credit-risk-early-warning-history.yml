        - name: ČNB Macro Data
          type: external-registry
          description: "Macroeconomic indicators — MACRO_DETERIORATION trigger, daily EOD"
        - name: News Feed (Seznam.cz, Novinky.cz)
          type: external-registry
          description: "News signals — NEWS_SIGNAL trigger, daily EOD"
        - name: Core Banking System
          type: internal-system
          description: "Credit limit utilisation — LIMIT_UTILISATION trigger, daily EOD"
        - name: silver.credit_history
