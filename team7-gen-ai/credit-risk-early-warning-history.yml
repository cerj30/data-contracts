      - "Records must never be updated or deleted after creation — immutable event log"

    retention:
      period: "60 months"
      rationale: "BCBS 239 regulatory requirement for risk data aggregation and ČNB supervisory audit trail"

    regulatory_mapping:
      - regulation: BCBS 239
        status: Contributes
        reason: "Provides timely risk signals with full data lineage. source_reference ensures every alert is traceable to a verifiable source. Supports risk data aggregation and reporting requirements."
      - regulation: BASEL IV
        status: Contributes
        reason: "PD values in alerts are inputs for IRB approach capital calculation. Early detection of credit deterioration supports accurate RWA assessment."
      - regulation: EBA
        status: Contributes
        reason: "Checker Agent validates all alert outputs. Next Best Action documents the recommended risk response per EBA data governance requirements."
      - regulation: DORA
        status: Both
        reason: "Contributes — streaming architecture with 99.5% SLA documented. Restricts — LLM Routing Gateway required to avoid vendor lock-in per ICT resilience requirements."
      - regulation: AML
        status: Contributes
        reason: "Escalated operational risk alerts forwarded to AML monitoring system. Insolvency signals support KYC refresh triggers."
      - regulation: MiFID II
        status: N/A
        reason: "Use case covers wholesale credit risk only — no investment advisory or capital markets data."
      - regulation: PSD2
        status: N/A
        reason: "No payment gateway or open banking data — system focused on credit risk early warning."
      - regulation: GDPR
        status: Restricts
        reason: "Alert context may reference company directors. Transient LLM Sessions (Zero Retention) applied — client data not used for model training. Data minimization enforced."
      - regulation: AI Act
        status: Both
        reason: "Restricts — High-Risk AI system per Annex III, alerts cannot trigger autonomous actions. Contributes — Human-in-the-loop: risk manager confirms or rejects every alert. Full audit trail via source_reference."
      - regulation: IFRS 9
        status: Contributes
        reason: "Early Warning Radar detects SICR triggers — insolvency filings, DPD spikes, utilisation anomalies. Enables timely reclassification to Stage 2/3 and ECL provisioning."

    ai_act:
      is_ai_input: true
      is_ai_output: true
      high_risk_classification: true
      fria_required: true
      fria_notes: >
        High-Risk classification per EU AI Act Annex III — AI system influences
        credit monitoring decisions affecting corporate clients' financial standing.
        Affected persons: company directors, beneficial owners, employees of
        monitored companies. Rights at risk: fair treatment, non-discrimination,
        protection against incorrect risk classification. Bias mitigation measures:
        (1) source_reference KO rule ensures every alert has a verifiable source —
        no unsourced AI hallucinations permitted; (2) Human-in-the-loop — risk
        manager must confirm every alert before action is taken; (3) is_hit field
        tracks false positive rate for continuous model improvement; (4) Checker
        Agent independently validates alert outputs before delivery to CRO.

