name: Databricks Git Sync
on:
  workflow_dispatch:  # run manually only — automatic sync disabled (PAT token 403)
  # push:
  #   branches:
  #     - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Databricks Pull
        run: |
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X PATCH \
            -H "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"branch": "main"}' \
            https://dbc-c89a4435-597d.cloud.databricks.com/api/2.0/repos/654922057342787)
          body=$(echo "$response" | sed -n '1p')
          status=$(echo "$response" | grep "HTTP_STATUS" | cut -d: -f2)
          echo "Response: $body"
          echo "HTTP status: $status"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "ERROR: Git sync failed with HTTP $status"
            exit 1
          fi
          echo "Git sync OK"

      - name: Wait for sync to complete
        run: sleep 5

      - name: Trigger Databricks Notebook Run
        run: |
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"job_id": 655530784566119}' \
            https://dbc-c89a4435-597d.cloud.databricks.com/api/2.1/jobs/run-now)
          body=$(echo "$response" | sed -n '1p')
          status=$(echo "$response" | grep "HTTP_STATUS" | cut -d: -f2)
          echo "Response: $body"
          echo "HTTP status: $status"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "ERROR: Job trigger failed with HTTP $status"
            exit 1
          fi
          echo "Job triggered OK"
          echo "$body" | grep -o '"run_id":[0-9]*' || true
