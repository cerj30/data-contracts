dataContractSpecification: 1.1.0

id: urn:nova-banka:strategy:knowledge-base:snapshot:v0.1.0

info:
  title: Strategy Knowledge Base Snapshot
  name: Strategy Knowledge Base Snapshot
  product_type: STATE
  maturity_score: 30%
  version: 0.1.0
  status: draft
  description: |
    Data latency: On-demand — the knowledge base is updated manually upon release of a new strategic document, with no regular schedule.
    Business Entity: Strategic Document Chunk
    Business Purpose: Knowledge base for the Horizon Bank strategic AI assistant. Contains text chunks extracted from strategic documents (bank mission, KPI targets, target segments, products, communication channels). Serves as the data source for the AI assistant's RAG pipeline.
    Consumers: RAG pipeline of the strategic AI assistant (internal, Team 6). Other teams access strategic knowledge through the assistant interface, not directly through this data product.
    Data Sources: Horizon Bank strategic documents in PDF format (e.g. Horizon-bank-strategy-2025.pdf). Documents are manually approved and uploaded by the Strategy team.

  x-regulatory:
    gdpr_relevant: false
    critical_data_element: true
    regulatory_framework: "None"

  owner: "Nova Banka \\ Strategy"
  contact:
    name: Valeria Lukomskaja
    email: xlukv00@vse.cz

servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-nova-banka-prod
    schema: strategy
    table: strategy_knowledge_snapshot
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-nova-banka-dev
    schema: strategy
    table: strategy_knowledge_snapshot

schema:
  - name: strategy_knowledge_snapshot
    description: "Knowledge base for the Horizon Bank strategic AI assistant. Contains text chunks extracted from strategic documents."

    fields:
      - name: record_id
        type: string
        description: Unique record identifier (UUID v4)
        required: true
        unique: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: business_date
        type: date
        description: Business processing date (YYYY-MM-DD)
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: region
        type: string
        description: Geographic region [CZ, SK]
        required: true
        enum: [CZ, SK]
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: chunk_id
        type: string
        description: "Unique chunk identifier (UUID v4); not sensitive"
        required: true
        unique: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: source_document
        type: string
        description: "Name of the source strategic document (e.g. Horizon-bank-strategy-2025.pdf); not sensitive"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: page_number
        type: integer
        description: "Page number in the source document; not sensitive"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: section_title
        type: string
        description: "Title of the document section the chunk belongs to; not sensitive"
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: content
        type: string
        description: "Text content of the chunk; internally sensitive — contains proprietary strategic information of the bank"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Confidential

      - name: content_length
        type: integer
        description: "Character count of the chunk content; not sensitive"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: created_at
        type: timestamp
        description: "Timestamp of record creation; not sensitive"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: updated_at
        type: timestamp
        description: "Timestamp of last record update; not sensitive"
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

quality:
  - rule: not_null
    field: record_id

  - rule: unique
    field: record_id

  - rule: not_null
    field: chunk_id
    description: "chunk_id must be unique and not null"

  - rule: unique
    field: chunk_id
    description: "No duplicate chunks allowed"

  - rule: not_null
    field: content

  - rule: not_null
    field: source_document

  - rule: not_null
    field: page_number

  - rule: row_count
    min: 50
    max: 50000
    description: "Detects data distribution anomalies (volume drop/spike). Expected range based on typical strategic document corpus size for a mid-sized bank."

  - rule: accepted_values
    field: region
    values: [CZ, SK]

  - rule: accepted_values
    field: source_document
    values_from: "strategy.approved_documents_reference"
    description: "source_document must be from the list of approved strategic documents"

  - rule: range
    field: content_length
    min: 50
    max: 2000
    description: "Each chunk must contain between 50 and 2000 characters to ensure meaningful RAG retrieval"

sla:
  availability: 99.5%
  data_latency: "On-demand — updated manually upon release of a new strategic document, with no regular schedule."
  retention_period: "24 months"

x-dawiso:
  data_product:
    dawiso_status: design
    domain: Strategy
    business_owner: "Valeria Lukomskaja - xlukv00@vse.cz"
    product_owner: "Valeria Lukomskaja - xlukv00@vse.cz"
    data_steward: "Valeria Lukomskaja - xlukv00@vse.cz"
    tags:
      - strategy
      - rag
      - ai-assistant
      - knowledge-base
      - nlp
    classification: "Strategy Data Product"
    data_classification: Confidential
    lineage:
      upstream:
        - name: "Horizon Bank Strategic Documents (PDF)"
          type: internal-system
          description: "Documents are manually approved and uploaded by the Strategy team (e.g. Horizon-bank-strategy-2025.pdf)."
      downstream:
        - name: "Strategic AI Assistant RAG Pipeline (internal, Team 6)"
          type: data-product
          description: "Other teams access strategic knowledge through the assistant interface, not directly through this data product."
    rules_ko:
      - "record_id must be a valid UUID v4"
      - "chunk_id must be unique and not null"
      - "content must be between 50 and 2000 characters"
      - "source_document must be from the list of approved documents"
      - "No duplicate chunks permitted"
      - "Volume must be within expected range (50–50000 rows)"
    retention:
      period: "24 months"
      rationale: "Strategic documents have a typical planning horizon of 2 years; older chunks are replaced by updated strategy releases."

glossary_entry:
  term: "Strategic Document Chunk"
  definition: "A discrete text segment extracted from an official Horizon Bank strategic document (such as mission statement, KPI targets, target customer segments, products, or communication channels), stored as a unit in the knowledge base to support retrieval-augmented generation (RAG) by the bank's strategic AI assistant."
  fibo_class: "fibo-fnd-arr-doc:Document"
  fibo_uri: "https://spec.edmcouncil.org/fibo/ontology/FND/Arrangements/Documents/Document"
  domain: Strategy
  dawiso_status: draft
  steward: "Valeria Lukomskaja - xlukv00@vse.cz"
  synonyms:
    - Knowledge Chunk
    - RAG Chunk
    - Text Segment
  acronyms:
    - RAG
    - KB
  related_capability: "Strategic AI Assistant / Knowledge Management"
  related_terms:
    - "RAG Pipeline"
    - "Vector Embedding"
    - "Strategic Document"
    - "Knowledge Base"
  kg_triple: "StrategyKnowledgeSnapshot --contains--> StrategicDocumentChunk --extractedFrom--> HorizonBankStrategicDocument"
