  glossary_entry:
    term: "Strategic Document Chunk"
    definition: "A discrete text segment extracted from an official Horizon AI Bank strategic document (such as mission statement, KPI targets, target customer segments, products, or communication channels), stored as a unit in the knowledge base to support retrieval-augmented generation (RAG) by the bank's strategic AI assistant."
    fibo_class: "fibo-fnd-arr-doc:Document"
    fibo_uri: "https://spec.edmcouncil.org/fibo/ontology/FND/Arrangements/Documents/Document"
    domain: Strategy
    dawiso_status: draft
    steward: "Valeria Lukomskaja - xlukv00@vse.cz"
    synonyms:
      - Knowledge Chunk
