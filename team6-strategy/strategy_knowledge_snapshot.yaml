dataContractSpecification: 1.1.0

id: urn:horizon-ai-bank:strategy:knowledge-base:snapshot:v0.1.0

info:
  title: Strategy Knowledge Base Snapshot
  name: Strategy Knowledge Base Snapshot
  product_type: STATE
  maturity_score: 30%
  version: 0.1.0
  status: draft
  description: |
    Data latency: On-demand — the knowledge base is updated manually upon release of a new strategic document, with no regular schedule.
    Business Entity: Strategic Document Chunk
    Business Purpose: Knowledge base for the Horizon Bank strategic AI assistant. Contains text chunks extracted from strategic documents (bank mission, KPI targets, target segments, products, communication channels). Serves as the data source for the AI assistant's RAG pipeline.
    Consumers: RAG pipeline of the strategic AI assistant (internal, Team 6). Other teams access strategic knowledge through the assistant interface, not directly through this data product.
    Data Sources: Horizon Bank strategic documents in PDF format (e.g. Horizon-bank-strategy-2025.pdf). Documents are manually approved and uploaded by the Strategy team.

  x-regulatory:
    gdpr_relevant: false
    critical_data_element: true
    regulatory_framework: "None"
    data_minimization: "true — only document chunk text and minimal metadata required for RAG retrieval are stored; no personal data collected"
    right_to_erasure: "N/A — product contains no personal data; chunks are derived from internal strategic documents"
    purpose_limitation: "true — processing strictly limited to powering the strategic AI assistant RAG pipeline; no secondary use permitted"

  owner: "Horizon AI Bank / Strategy"
  contact:
    name: Valeria Lukomskaja
    email: xlukv00@vse.cz

servers:
  PRODUCTION:
    type: databricks
    host: horizon-ai-bank-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-horizon-ai-bank-prod
    schema: strategy
    table: strategy_knowledge_snapshot
  DEVELOPMENT:
    type: databricks
    host: horizon-ai-bank-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-horizon-ai-bank-dev
    schema: strategy
    table: strategy_knowledge_snapshot

schema:
  - name: strategy_knowledge_snapshot
    description: "Knowledge base for the Horizon Bank strategic AI assistant. Contains text chunks extracted from strategic documents."

    fields:
      - name: record_id
        type: string
        description: Unique record identifier (UUID v4)
        required: true
        unique: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — surrogate key for audit traceability"

      - name: business_date
        type: date
        description: Business processing date (YYYY-MM-DD)
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "BCBS 239 — timeliness of risk data reporting"

      - name: region
        type: string
        description: Geographic region [CZ, SK]
        required: true
        enum: [CZ, SK]
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — geographic partitioning"

      - name: chunk_id
        type: string
        description: "Unique chunk identifier (UUID v4); not sensitive"
        required: true
        unique: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — surrogate key for RAG chunk deduplication"

      - name: source_document
        type: string
        description: "Name of the source strategic document (e.g. Horizon-bank-strategy-2025.pdf); not sensitive"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — document provenance tracking for AI auditability"

      - name: page_number
        type: integer
        description: "Page number in the source document; not sensitive"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — document traceability for RAG explainability"

      - name: section_title
        type: string
        description: "Title of the document section the chunk belongs to; not sensitive"
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — section-level provenance for AI explainability"

      - name: content
        type: string
        description: "Text content of the chunk; internally sensitive — contains proprietary strategic information of the bank"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Confidential
          regulatory_basis: "Internal governance — proprietary strategic content; EU AI Act Art. 13 — transparency of AI input data"

      - name: content_length
        type: integer
        description: "Character count of the chunk content; not sensitive"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — chunk size quality gate for RAG retrieval effectiveness"

      - name: created_at
        type: timestamp
        description: "Timestamp of record creation; not sensitive"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — audit trail for document ingestion"

      - name: updated_at
        type: timestamp
        description: "Timestamp of last record update; not sensitive"
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — change tracking for document versioning"

quality:
  - rule: not_null
    field: record_id

  - rule: unique
    field: record_id

  - rule: not_null
    field: chunk_id
    description: "chunk_id must be unique and not null"

  - rule: unique
    field: chunk_id
    description: "No duplicate chunks allowed"

  - rule: not_null
    field: content

  - rule: not_null
    field: source_document

  - rule: not_null
    field: page_number

  - rule: row_count
    min: 50
    max: 50000
    description: "Detects data distribution anomalies (volume drop/spike). Expected range based on typical strategic document corpus size for a mid-sized bank."

  - rule: accepted_values
    field: region
    values: [CZ, SK]

  - rule: accepted_values
    field: source_document
    values_from: "strategy.approved_documents_reference"
    description: "source_document must be from the list of approved strategic documents"

  - rule: range
    field: content_length
    min: 50
    max: 2000
    description: "Each chunk must contain between 50 and 2000 characters to ensure meaningful RAG retrieval"

sla:
  availability: 99.5%
  data_latency: "On-demand — updated manually upon release of a new strategic document, with no regular schedule."
  retention_period: "24 months"

