      - "date + campaign + platform must be unique (one row per combination)"
      - "clients must be computed as COUNT(DISTINCT client_id) — COUNT(*) is not acceptable"
      - "cpa_czk must equal total_cost_czk / clients within 0.01 CZK tolerance"
      - "cpa_czk must be null when clients = 0"
      - "clients and total_cost_czk must be non-negative"
      - "All active campaigns must be present per business date — no gaps in coverage"
      - "CPA aggregation must be consistent across all downstream reporting layers"
      - "OPEN GAP: region is hardcoded 'CZ' simulation — must be replaced with real source before geographic reporting is used"
      - "OPEN GAP: device_type is hardcoded 'mobile' simulation in gold_fact_acquisitions"
      - "OPEN GAP: dq_flag is commented out in gold_fact_acquisitions — must be implemented before automated quality monitoring is operational"
    retention:
      period: "60 months"
      rationale: >
        Retention of 3–5 years (60 months maximum) supports multi-year trend analysis
        of marketing performance, campaign benchmarking, finance audit requirements,
        and management reporting lookback periods.

    # NEW v3.3 — Regulatory Mapping
    regulatory_mapping:
      - regulation: BCBS 239
        status: N/A
        reason: >
          Product contains no risk data, RWA, capital ratios, credit exposure,
          or any other BCBS 239 in-scope data. Marketing campaign KPIs
          (spend, acquisition counts, CPA) are a commercial function outside
          BCBS 239 regulatory scope.
      - regulation: BASEL IV
        status: N/A
        reason: >
          Product contains no risk-weighted asset (RWA), capital ratio, credit
          exposure, or prudential capital calculation inputs. Marketing campaign
          KPIs are a commercial function with no Basel IV scope.
      - regulation: EBA
        status: Contributes
        reason: >
          Product supports EBA data governance guidelines through documented
          ownership, data stewardship, lineage (including gold and silver-layer
          sources), quality rules, and data classification.
      - regulation: DORA
        status: Contributes
        reason: >
          SLA availability (99.5%), defined data latency (D+1 by 07:00 CET),
          and documented upstream gold/silver lineage contribute to ICT operational
          resilience and data availability recovery requirements under DORA.
      - regulation: AML
        status: N/A
        reason: >
          Product contains no transaction monitoring thresholds, KYC identity
          fields, suspicious activity flags, or customer identity data. Aggregated
          campaign-level marketing KPIs are entirely outside AML scope.
      - regulation: MiFID II
        status: N/A
        reason: >
          Product contains no capital markets, investment product suitability,
          order execution, or transaction reporting data. Marketing acquisition
          KPIs have no MiFID II applicability.
      - regulation: PSD2
        status: N/A
        reason: >
          Product contains no payment account transaction data, open banking
          APIs, or payment service provider information. All fields are
          aggregated campaign-level metrics with no PSD2 scope.
      - regulation: GDPR
        status: N/A
        reason: >
          Product contains no personal data in its output. client_id is used
          only as a deduplication key during the COUNT(DISTINCT) aggregation
          transform and is intentionally excluded from this product.
          gdpr_relevant is false. No GDPR obligations apply to the output layer.
      - regulation: AI Act
        status: N/A
        reason: >
          Product is not an input to or output of an AI or ML system. CPA and
          acquisition counts are deterministic formula-based aggregations from
          gold_fact_acquisitions. No automated decision-making or profiling
          is performed.
      - regulation: IFRS 9
        status: N/A
        reason: >
          Product contains no expected credit loss (ECL) staging, probability
          of default, financial instrument classification, or impairment data.
          Marketing spend and acquisition counts have no IFRS 9 scope.

    # NEW v3.3 — AI Act / FRIA Assessment
    ai_act:
      is_ai_input: false
      is_ai_output: false
      high_risk_classification: false
      fria_required: false
      fria_notes: >
        FRIA IS NOT REQUIRED. This product is a deterministic aggregation of
        campaign-level marketing KPIs (spend, client counts, CPA) produced by
        COUNT(DISTINCT client_id) grouping and formula-based CPA computation
        from gold_fact_acquisitions and advertising platform cost exports.
        It is not used as input to any AI or ML model and is not produced by
        any AI or ML model. No automated decision-making affecting individuals
        is performed. No personal data is present in the output. EU AI Act
        high-risk classification criteria under Annex III are not met.

  glossary_entry:
    term: "Cost Per Acquisition (CPA)"
    definition: >
      An aggregated financial performance indicator representing the total marketing
      expenditure required to acquire one new banking client through a specific
      campaign and advertising platform on a given business date. Calculated as
      total campaign spend in Czech Koruna (CZK) divided by the count of distinct
      acquired clients (COUNT(DISTINCT client_id) from gold_fact_acquisitions).
      Serves as the primary efficiency KPI for evaluating marketing campaign
      performance across channels and platforms within the Strategy domain.
    fibo_class: "fibo-fnd-gao-obj:StrategicObjective"
    fibo_uri: "https://spec.edmcouncil.org/fibo/ontology/FND/GoalsAndObjectives/Objectives/"
    domain: Strategy
    dawiso_status: draft
    steward: "Xuan Vi Phamová - phax00@vse.cz"
    synonyms:
      - Cost Per Acquisition
      - Customer Acquisition Cost
      - Náklady na získání klienta
    acronyms:
      - CPA
      - CAC
    related_capability: "Marketing Performance Management"
    related_terms:
      - "Marketing Campaign"
      - "Costs of Customer Acquisition Campaigns (total_cost_czk)"
      - "Acquired Clients (clients)"
      - "Conversion Rate"
