schema:
  name: strategy_marketing_performance_acquisition_aggregation
  description: >
    Daily aggregated marketing performance table. Each row represents one unique
    combination of campaign date, campaign name, and advertising platform.
    Contains KPI metrics — acquired clients, total spend, and cost per acquisition —
    used for cross-layer campaign performance reporting and finance reconciliation.
    The clients field is derived as COUNT(DISTINCT client_id) from the upstream
    gold_fact_acquisitions table; client_id itself is not present in this product.

  fields:
    - name: record_id
      type: string
      description: Unique record identifier (UUID v4)
      required: true
      unique: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — surrogate key for audit traceability"

    - name: business_date
      type: date
      description: Business processing date (YYYY-MM-DD)
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — processing date traceability"

    - name: region
      type: string
      description: >
        Geographic region [CZ, SK].
        WARNING — SIMULATED FIELD: As of v0.1.0 this field is hardcoded as 'CZ'
        in the upstream gold_fact_acquisitions table. Real region signal must be
        sourced from the branch or service system before this field can be used
        for geographic segmentation in reporting.
      required: true
      enum: [CZ, SK]
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — geographic partitioning for
          campaign reporting scope; NOTE: value is simulated pending real source"

    - name: date
      type: date
      description: >
        Campaign activity date (YYYY-MM-DD) for which the KPI metrics are aggregated.
        Derived from DATE(activated_at) in gold_fact_acquisitions.
        Together with campaign and platform forms the composite natural key of the table.
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — temporal dimension of campaign
          performance aggregation and composite natural key"

    - name: campaign
      type: string
      description: >
        Name or identifier of the marketing campaign as defined in the source
        advertising platform or CRM system. Mapped from the UTM campaign parameter
        in gold_fact_acquisitions, sourced from silver_web_sessions.
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — campaign dimension for KPI
          attribution and cross-layer aggregation consistency"

    - name: platform
      type: string
      description: >
        Advertising or tracking platform from which campaign data originates.
        Expected values include: Google Ads, Meta Ads, Affiliate, Web tracking, CRM.
        FIELD MAPPING: maps to the 'source' column (UTM source parameter) in
        gold_fact_acquisitions containing values such as 'google', 'meta',
        'affiliate'. Renamed to 'platform' during the aggregation transform
        for reporting clarity.
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — platform dimension for spend
          reconciliation; maps to 'source' (UTM) in gold_fact_acquisitions"

    - name: clients
      type: integer
      description: >
        Number of distinct customers acquired through the campaign on the given date.
        Computed as COUNT(DISTINCT client_id) from gold_fact_acquisitions grouped
        by acquisition_date, campaign, and source (platform). COUNT(DISTINCT) is
        mandatory to prevent double-counting of customers with multiple web sessions
        or account records. Used as the denominator in the CPA calculation.
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — acquisition count KPI derived via
          COUNT(DISTINCT client_id); finance audit traceability for customer
          onboarding reconciliation against core banking"

    - name: total_cost_czk
      type: decimal
      description: >
        Total marketing spend for the campaign and platform on the given date,
        expressed in Czech Koruna (CZK). Must be non-negative. Used as the
        numerator in CPA calculation. Sourced from advertising platform cost
        exports (Google Ads, Meta Ads, Affiliate); not present in
        gold_fact_acquisitions — joined to acquisition counts during the
        aggregation transform.
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — financial spend KPI for budget
          reconciliation and management reporting"

    - name: cpa_czk
      type: decimal
      description: >
        Cost per acquisition in CZK, calculated as total_cost_czk / clients.
        Must be null when clients = 0 to prevent division-by-zero errors.
        Must reconcile with the formula across all aggregation layers.
        Because clients is derived via COUNT(DISTINCT client_id), CPA correctly
        reflects spend per unique acquired customer and not per session or
        account record.
      required: false
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — derived efficiency KPI; formula
          consistency required across all downstream reporting layers"

    - name: dq_flag
      type: string
      description: >
        Data quality flag to be propagated from the upstream gold_fact_acquisitions
        pipeline. WARNING — NOT YET OPERATIONAL: dq_flag is currently commented
        out in the upstream gold table definition. Included as a placeholder;
        must be populated before automated quality monitoring is operational.
        Expected values: PASS, FAIL, UNKNOWN.
      required: false
      enum: [PASS, FAIL, UNKNOWN]
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — upstream DQ gate propagation
            (PENDING: not yet implemented in gold_fact_acquisitions)"

quality:
  - rule: not_null
    field: record_id

  - rule: unique
    field: record_id

  - rule: not_null
    field: date

  - rule: not_null
    field: campaign

  - rule: not_null
    field: platform

  - rule: not_null
    field: clients

  - rule: not_null
    field: total_cost_czk

  - rule: not_null
    field: business_date

  - rule: accepted_values
    field: region
    values: [CZ, SK]

  - rule: accepted_values
    field: dq_flag
    values: [PASS, FAIL, UNKNOWN]

  - rule: row_count
    min: 50
    max: 5000
    description: >
      Detects data distribution anomalies (volume drop/spike). Each daily load
      is expected to contain between 50 and 5,000 rows reflecting active
      campaign x platform x date combinations across CZ and SK. Values outside
      this range trigger a distribution anomaly alert requiring investigation.

  - rule: custom
    name: composite_key_uniqueness
    description: >
      The combination of date, campaign, and platform must be unique per daily load,
      enforcing one row per campaign-platform-date granularity.
    fields: [date, campaign, platform]

  - rule: custom
    name: cpa_formula_consistency
    description: >
      cpa_czk must equal total_cost_czk / clients within a tolerance of 0.01 CZK.
      Records where clients = 0 must have cpa_czk as null. Validates consistent
      CPA aggregation across all reporting layers. clients must be computed as
      COUNT(DISTINCT client_id) — plain COUNT(*) is not acceptable.
    field: cpa_czk

  - rule: custom
    name: distinct_client_count_validation
    description: >
      clients must equal COUNT(DISTINCT client_id) from gold_fact_acquisitions
      for the same date + campaign + source (platform) grouping. Any discrepancy
      indicates the aggregation transform used COUNT(*) instead of COUNT(DISTINCT
      client_id), causing double-counting of multi-session customers.
    field: clients

  - rule: custom
    name: region_simulation_flag
    description: >
      WARNING: region is currently hardcoded as 'CZ' in gold_fact_acquisitions.
      This rule monitors whether all rows contain only 'CZ' — if true, it confirms
      the simulation is still active and real region data has not yet been sourced.
      Must be resolved before geographic segmentation is used in reporting.
    field: region

  - rule: custom
    name: dq_flag_population_check
    description: >
      dq_flag is currently commented out upstream and will be null for all rows.
      Monitors null rate of dq_flag — 100% null rate confirms the upstream gap
      is still open and must be escalated to the data engineering team.
    field: dq_flag

  - rule: min_value
    field: clients
    min: 0
    description: "Number of acquired clients must be non-negative."

  - rule: min_value
    field: total_cost_czk
    min: 0
    description: "Total campaign cost must be non-negative."

  - rule: completeness
    field: campaign
    threshold: 100%
    description: >
      Complete coverage of all active campaigns required per business date.
      No missing campaign records permitted.

