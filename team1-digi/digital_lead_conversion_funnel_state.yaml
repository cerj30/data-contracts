    definition: "A structured sequence of stages through which a digitally acquired retail sales lead progresses from creation to successful product conversion or drop-off."
    fibo_class: "fibo-fbc-fct-mkt:MarketingCampaign"
    fibo_uri: "https://spec.edmcouncil.org/fibo/"
    domain: Retail Sales
    dawiso_status: draft
